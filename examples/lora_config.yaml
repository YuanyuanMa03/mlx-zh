# MLX-LM LoRA 微调配置示例
# 适用于中文模型微调

# 模型配置
model: "mlx-community/Qwen2.5-7B-Instruct-4bit"

# 数据配置
data: "./data"

# 训练配置
train: true
iters: 500                      # 训练迭代次数
batch_size: 4                   # 批量大小（16GB 内存推荐 4，32GB 可用 8）
learning_rate: 1e-5             # 学习率
max_seq_length: 2048            # 最大序列长度

# LoRA 配置
lora_layers: 16                 # LoRA 层数（内存不足可减少到 8 或 4）
lora_parameters:                # 要应用 LoRA 的参数
  - ["model.layers.", ".mlp.gate_proj"]
  - ["model.layers.", ".mlp.down_proj"]
  - ["model.layers.", ".mlp.up_proj"]
  - ["model.layers.", ".self_attn.q_proj"]
  - ["model.layers.", ".self_attn.v_proj"]

# 输出配置
adapter_path: "./adapters"      # 适配器保存路径

# 验证配置
val_batches: 25                 # 每次验证的批次数
eval_batches: 10                # 评估时的批次数

# 其他选项
# seed: 42                      # 随机种子
# grad_checkpoint: false        # 梯度检查点（内存不足时启用）
# grad_accumulation_steps: 1    # 梯度累积步数
# mask_prompt: false            # 是否掩码提示词
